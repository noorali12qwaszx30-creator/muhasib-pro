<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#E11D48"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="محاسبة جومانجي"/>
<title>محاسبة جومانجي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p:#E11D48;--p2:#F43F5E;--p3:#be123c;
  --bg:#F8FAFC;--sf:#ffffff;--sf2:#F1F5F9;--sf3:#E2E8F0;
  --br:#E2E8F0;--tx:#0F172A;--tx2:#334155;--mu:#94A3B8;
  --gr:#10B981;--rd:#F43F5E;--or:#F59E0B;--pu:#8B5CF6;--bl:#3B82F6;
  --shadow:0 4px 24px rgba(225,29,72,.12);
  --shadow2:0 2px 12px rgba(15,23,42,.06);
  --radius:20px;--radius2:16px;--radius3:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Tajawal',sans-serif}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.scr{display:none;flex-direction:column;height:100%;overflow:hidden}.scr.on{display:flex}

/* ── LOGIN ── */
#LS{
  background:linear-gradient(160deg,#E11D48 0%,#F43F5E 40%,#F8FAFC 70%);
  align-items:center;justify-content:center;padding:24px;overflow-y:auto;
}
.lcard{
  background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.8);border-radius:28px;
  padding:40px 28px;width:100%;max-width:390px;
  box-shadow:0 32px 64px rgba(225,29,72,.2),0 8px 24px rgba(15,23,42,.08);
  animation:slideUp .5s cubic-bezier(.32,.72,0,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.llogo{text-align:center;margin-bottom:32px}
.lic{
  width:88px;height:88px;
  background:linear-gradient(135deg,#E11D48,#F43F5E);
  border-radius:26px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:40px;
  box-shadow:0 12px 32px rgba(225,29,72,.4);
}
.llogo h1{font-size:26px;font-weight:900;color:var(--tx);letter-spacing:-.5px}
.llogo p{font-size:14px;color:var(--mu);margin-top:4px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:8px}
.fi{
  width:100%;padding:14px 16px;background:var(--sf2);
  border:2px solid var(--br);border-radius:var(--radius3);
  color:var(--tx);font-family:'Tajawal',sans-serif;font-size:16px;
  outline:none;transition:.2s;appearance:none;
}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(225,29,72,.12);background:#fff}
select.fi{cursor:pointer}
.btn-g{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#E11D48,#F43F5E);
  border:none;border-radius:var(--radius3);color:#fff;
  font-family:'Tajawal',sans-serif;font-size:17px;font-weight:800;
  cursor:pointer;box-shadow:0 8px 24px rgba(225,29,72,.35);
  transition:all .2s;letter-spacing:.3px;
}
.btn-g:active{transform:scale(.97);box-shadow:0 4px 12px rgba(225,29,72,.25)}
.err{background:rgba(244,63,94,.08);border:1.5px solid rgba(244,63,94,.25);color:var(--rd);padding:12px 16px;border-radius:var(--radius3);font-size:13px;margin-bottom:16px}
.demo{margin-top:20px;padding:14px;background:linear-gradient(135deg,rgba(225,29,72,.06),rgba(244,63,94,.04));border:1px solid rgba(225,29,72,.15);border-radius:var(--radius3);font-size:12px;color:var(--mu);text-align:center;line-height:2.4}
.demo b{color:var(--tx2);display:block;margin-bottom:4px;font-size:13px}

/* ── HEADER ── */
.tbar{
  background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(226,232,240,.6);
  padding:0 20px;height:64px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;gap:12px;
  position:sticky;top:0;z-index:10;
}
.tbl{display:flex;align-items:center;gap:12px;min-width:0}
.tbi{
  width:40px;height:40px;
  background:linear-gradient(135deg,#E11D48,#F43F5E);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(225,29,72,.3);
}
.tbt{font-size:17px;font-weight:800;color:var(--tx);letter-spacing:-.3px}
.tbu{font-size:12px;color:var(--mu);margin-top:1px}
.tbr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.rb{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(225,29,72,.1);color:var(--p)}
.lbtn{
  width:36px;height:36px;background:rgba(244,63,94,.08);
  border:1.5px solid rgba(244,63,94,.15);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--rd);font-size:16px;transition:.15s;
}
.lbtn:active{background:rgba(244,63,94,.15)}

/* ── CONTENT ── */
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:20px 16px 100px}

/* ── BOTTOM NAV (Floating) ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  padding:0 16px 20px;z-index:100;pointer-events:none;
}
.bnav-inner{
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(226,232,240,.7);border-radius:24px;
  display:flex;padding:8px;pointer-events:all;
  box-shadow:0 8px 32px rgba(15,23,42,.1),0 2px 8px rgba(15,23,42,.06);
}
.ntab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px;cursor:pointer;color:var(--mu);font-size:10px;font-weight:700;
  gap:4px;border:none;background:none;font-family:'Tajawal',sans-serif;
  min-width:0;border-radius:16px;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.ntab.on{color:var(--p)}
.ntab.on::before{
  content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);
  width:36px;height:36px;background:rgba(225,29,72,.12);
  border-radius:12px;z-index:0;
  animation:tabPop .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes tabPop{from{transform:translateX(-50%) scale(.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
.ni{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.ntab.on .ni{transform:translateY(-2px) scale(1.15)}
.ntab span:last-child{position:relative;z-index:1;transition:all .2s}
.ntab.on span:last-child{font-weight:800}

/* ── PAGE TITLE ── */
.pt{font-size:22px;font-weight:900;margin-bottom:20px;letter-spacing:-.4px}
.pt span{color:var(--p)}

/* ── HERO CARD ── */
.hero-card{
  background:linear-gradient(135deg,#E11D48 0%,#F43F5E 50%,#be123c 100%);
  border-radius:28px;padding:28px 24px;margin-bottom:20px;
  box-shadow:0 16px 48px rgba(225,29,72,.35);
  position:relative;overflow:hidden;
}
.hero-card::before{
  content:'';position:absolute;top:-40px;left:-40px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.hero-card::after{
  content:'';position:absolute;bottom:-60px;right:-20px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.hero-label{font-size:13px;color:rgba(255,255,255,.75);font-weight:600;margin-bottom:8px;position:relative;z-index:1}
.hero-val{font-size:38px;font-weight:900;color:#fff;letter-spacing:-1px;position:relative;z-index:1;line-height:1}
.hero-unit{font-size:14px;color:rgba(255,255,255,.7);margin-top:4px;position:relative;z-index:1}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:20px;position:relative;z-index:1}
.hero-mini{background:rgba(255,255,255,.15);border-radius:14px;padding:12px 10px;text-align:center;backdrop-filter:blur(10px)}
.hero-mini-lbl{font-size:10px;color:rgba(255,255,255,.7);font-weight:600;margin-bottom:4px}
.hero-mini-val{font-size:15px;font-weight:800;color:#fff}

/* ── STAT CARDS (2x2 grid) ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.sc{
  background:#fff;border-radius:var(--radius2);padding:18px 16px;
  box-shadow:var(--shadow2);border:1px solid rgba(226,232,240,.5);
  transition:transform .15s;position:relative;overflow:hidden;
}
.sc:active{transform:scale(.98)}
.sc-icon{
  width:44px;height:44px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:12px;
}
.sc-icon-p{background:rgba(225,29,72,.1)}.sc-icon-g{background:rgba(16,185,129,.1)}
.sc-icon-r{background:rgba(244,63,94,.1)}.sc-icon-o{background:rgba(245,158,11,.1)}
.sc-icon-b{background:rgba(59,130,246,.1)}.sc-icon-pu{background:rgba(139,92,246,.1)}
.sl{font-size:11px;color:var(--mu);font-weight:600;margin-bottom:6px}
.sv{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1}
.sv-p{color:var(--p)}.sv-g{color:var(--gr)}.sv-r{color:var(--rd)}.sv-o{color:var(--or)}.sv-b{color:var(--bl)}.sv-pu{color:var(--pu)}
.su{font-size:10px;color:var(--mu);margin-top:3px}

/* ── CARDS ── */
.card{
  background:#fff;border-radius:var(--radius2);overflow:hidden;
  margin-bottom:16px;box-shadow:var(--shadow2);
  border:1px solid rgba(226,232,240,.5);
}
.ch{
  padding:16px 18px;border-bottom:1px solid rgba(226,232,240,.6);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.cht{font-size:15px;font-weight:800;color:var(--tx)}

/* ── TODAY GRID ── */
.tg{display:grid;grid-template-columns:1fr 1fr}
.ti{padding:18px 14px;text-align:center}
.ti+.ti{border-right:1px solid rgba(226,232,240,.6)}
.ti:nth-child(3),.ti:nth-child(4){border-top:1px solid rgba(226,232,240,.6)}
.tl2{font-size:11px;color:var(--mu);margin-bottom:6px;font-weight:600}
.tv{font-size:21px;font-weight:900;letter-spacing:-.4px}

/* ── BUTTONS ── */
.bsm{
  display:inline-flex;align-items:center;gap:6px;padding:9px 16px;
  background:linear-gradient(135deg,#E11D48,#F43F5E);border:none;
  border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;
  font-size:12px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 12px rgba(225,29,72,.25);transition:.15s;
}
.bsm:active{transform:scale(.96)}
.ab{
  padding:6px 10px;border-radius:8px;border:1.5px solid var(--br);
  cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;
  display:inline-flex;align-items:center;gap:4px;
  background:transparent;transition:.15s;font-weight:600;
}
.be{color:var(--bl);border-color:rgba(59,130,246,.25);background:rgba(59,130,246,.05)}
.be:active{background:rgba(59,130,246,.12)}
.bd{color:var(--rd);border-color:rgba(244,63,94,.25);background:rgba(244,63,94,.05)}
.bd:active{background:rgba(244,63,94,.12)}
.bon{color:var(--or);border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.05)}
.bof{color:var(--gr);border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05)}

/* ── FAB ── */
.fab{
  position:fixed;left:20px;bottom:86px;width:56px;height:56px;
  background:linear-gradient(135deg,#E11D48,#F43F5E);border:none;
  border-radius:18px;color:#fff;cursor:pointer;
  box-shadow:0 8px 24px rgba(225,29,72,.4),0 2px 8px rgba(225,29,72,.2);
  display:flex;align-items:center;justify-content:center;z-index:50;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.fab:active{transform:scale(.88) rotate(45deg)}
.fab svg{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.fab:hover svg{transform:rotate(90deg)}

/* ── MODAL (Bottom Sheet) ── */
.mov{
  position:fixed;inset:0;
  background:rgba(15,23,42,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;
}
.mov.on{opacity:1;pointer-events:all}
.modal{
  background:#fff;border-radius:28px 28px 0 0;width:100%;max-width:500px;
  padding:0 0 32px;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:94vh;overflow-y:auto;
}
.mov.on .modal{transform:translateY(0)}
.mdrg{width:44px;height:5px;background:var(--br);border-radius:3px;margin:14px auto 0}
.mhdr{padding:20px 20px 16px;border-bottom:1px solid rgba(226,232,240,.6)}
.mtl{font-size:18px;font-weight:900;color:var(--tx);letter-spacing:-.3px}
.mbody{padding:20px}
.mac{display:flex;gap:10px;padding:0 20px}
.bcn{
  flex:1;padding:14px;background:var(--sf2);border:none;
  border-radius:var(--radius3);color:var(--tx2);cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;
}
.bcn:active{background:var(--sf3)}
.bsv{
  flex:2;padding:14px;background:linear-gradient(135deg,#E11D48,#F43F5E);
  border:none;border-radius:var(--radius3);color:#fff;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;
  box-shadow:0 6px 16px rgba(225,29,72,.3);
}
.bsv:active{transform:scale(.98)}
.afi{background:rgba(16,185,129,.06)!important;border-color:rgba(16,185,129,.3)!important;color:var(--gr)!important;font-weight:700}
.alb{color:var(--gr)!important;font-weight:600}

/* ── BADGES ── */
.bdg{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.ba{background:rgba(16,185,129,.1);color:var(--gr)}.bi{background:rgba(244,63,94,.1);color:var(--rd)}

/* ── CHART ── */
.cw{padding:16px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.clb{width:56px;font-size:11px;color:var(--mu);flex-shrink:0;text-align:left;font-weight:600}
.cbg{flex:1;height:28px;background:var(--sf2);border-radius:8px;overflow:hidden}
.cfl{height:100%;border-radius:8px;display:flex;align-items:center;padding-right:10px;font-size:10px;font-weight:800;color:#fff;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.cnm{width:72px;text-align:right;font-size:11px;font-weight:700}

/* ── CONFIRM ── */
.cov{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.cov.on{opacity:1;pointer-events:all}
.cbox{
  background:#fff;border-radius:24px;padding:28px 24px;
  width:100%;max-width:300px;text-align:center;
  box-shadow:0 24px 48px rgba(15,23,42,.15);
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.ctl{font-size:16px;font-weight:900;margin-bottom:8px;color:var(--tx)}
.csb{font-size:13px;color:var(--mu);margin-bottom:20px;line-height:1.6}
.cac{display:flex;gap:10px}
.bno{flex:1;padding:12px;background:var(--sf2);border:none;border-radius:12px;color:var(--tx2);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700}
.bys{flex:1;padding:12px;background:linear-gradient(135deg,#F43F5E,#e11d48);border:none;border-radius:12px;color:#fff;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800}

/* ── ALERT ── */
.alrt{background:rgba(245,158,11,.06);border:1.5px solid rgba(245,158,11,.2);border-radius:var(--radius3);padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alic{font-size:20px;flex-shrink:0}.altx{font-size:12px;color:var(--tx2);line-height:1.7}.altt{font-size:13px;font-weight:700;color:var(--or);margin-bottom:3px}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{
  padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;border:2px solid var(--br);background:#fff;
  color:var(--mu);font-family:'Tajawal',sans-serif;transition:.15s;
}
.chip.on{border-color:var(--p);background:rgba(225,29,72,.08);color:var(--p)}

/* ── ROW ITEMS ── */
.ri{padding:14px 18px;border-top:1px solid rgba(226,232,240,.5);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:.15s}
.ri:first-child{border-top:none}
.ri:active{background:rgba(225,29,72,.03)}
.rim{flex:1;min-width:0}
.rit{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ris{font-size:11px;color:var(--mu);margin-top:3px;font-weight:500}
.riv{font-size:15px;font-weight:800}

/* ── LOW STOCK ── */
.lbdg{background:rgba(244,63,94,.1);color:var(--rd);padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}

/* ── EMPTY ── */
.emp{text-align:center;padding:48px 16px;color:var(--mu)}.empi{font-size:48px;margin-bottom:12px;opacity:.4}

/* ── COLORS ── */
.gold{color:var(--p)}.grn{color:var(--gr)}.red{color:var(--rd)}.org{color:var(--or)}.blu{color:var(--bl)}

/* ── ANIMATIONS ── */
.card,.sc{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SYNC BANNER ── */
#syncBanner{transition:transform .3s ease}
</style>
</head>
<body>
<div id="app">
<div id="LS" class="scr on">
  <div class="lcard">
    <div class="llogo">
      <div class="lic">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
</div>
      <h1>محاسبة جومانجي</h1>
      <p>نظام المحاسبة المتكامل</p>
    </div>
    <div id="lerr" class="err" style="display:none"></div>
    <div class="fg">
      <label>اسم المستخدم</label>
      <input class="fi" id="iU" placeholder="أدخل اسم المستخدم" autocomplete="off" autocorrect="off" autocapitalize="off"/>
    </div>
    <div class="fg">
      <label>كلمة المرور</label>
      <input class="fi" id="iP" type="password" placeholder="أدخل كلمة المرور"/>
    </div>
    <button class="btn-g" onclick="doLogin()">تسجيل الدخول</button>
    <div class="demo">
      <b>حسابات تجريبية</b>
      مدير / 1234 &nbsp;·&nbsp; كاشير / 1234 &nbsp;·&nbsp; سائق / 1234
    </div>
  </div>
</div>
<div id="MS" class="scr">
  <div class="tbar">
    <div class="tbl">
      <div class="tbi">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
</div>
      <div>
        <div class="tbt">محاسبة جومانجي</div>
        <div class="tbu" id="tbU"></div>

// If current time is between 00:00-10:59, treat as previous calendar day
function tds(){
  const now=new Date();
  const h=now.getHours();
  if(h<11){
    // Before 11AM = still previous shift day
    const prev=new Date(now);
    prev.setDate(prev.getDate()-1);
    return prev.toISOString().slice(0,10);
  }
  return now.toISOString().slice(0,10);
}

async function pushToCloud(data){
  if(!db_fs)return;
  try{
    await db_fs.collection("jumanji").doc("main").set(data);
  }catch(e){ console.warn("Firebase write:",e) }
}
function schedulePush(){if(syncTimeout)clearTimeout(syncTimeout);syncTimeout=setTimeout(()=>{pushToCloud(db);syncTimeout=null},1200)}
async function loadFromCloud(){
  if(!db_fs)return;
  try{
    showBanner("جاري التزامن...","#2563eb");
    const snap=await db_fs.collection("jumanji").doc("main").get();
    if(snap.exists){
      const d=snap.data();
      if(!d.taskCats)d.taskCats=JSON.parse(JSON.stringify(DEF.taskCats));
      if(!d.tasks)d.tasks=JSON.parse(JSON.stringify(DEF.tasks));
      if(!d.nextCatId)d.nextCatId=DEF.nextCatId;
      if(!d.nextTaskId)d.nextTaskId=DEF.nextTaskId;
      db=d;localStorage.setItem("rms_j8",JSON.stringify(db));
      showBanner("تم التزامن","#16a34a");
    }else{await pushToCloud(db);showBanner("تم إنشاء قاعدة البيانات","#16a34a")}
    setTimeout(hideBanner,2500);
  }catch(e){showBanner("وضع محلي","#ea580c");setTimeout(hideBanner,3000)}
}
function subscribeRealtime(){
  if(!db_fs)return;
  if(unsubscribe)unsubscribe();
  unsubscribe=db_fs.collection("jumanji").doc("main").onSnapshot(function(snap){
    if(snap.exists&&!syncTimeout){
      const d=snap.data();
      if(!d.taskCats)d.taskCats=JSON.parse(JSON.stringify(DEF.taskCats));
      if(!d.tasks)d.tasks=JSON.parse(JSON.stringify(DEF.tasks));
      db=d;localStorage.setItem("rms_j8",JSON.stringify(db));
      if(CU)render();
    }
  },function(e){console.warn("Realtime:",e)});
}

// EXPENSES
function rExps(){
  const mine=CU.role==="cashier"?db.expenses.filter(e=>e.createdBy===CU.id):db.expenses;
  const td=tds(),now=new Date(),ms=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const wa=new Date();wa.setDate(wa.getDate()-6);
  const tdt=mine.filter(e=>e.date===td).reduce((s,e)=>s+e.total,0);
  const mnt=mine.filter(e=>e.date.startsWith(ms)).reduce((s,e)=>s+e.total,0);
  const wkt=mine.filter(e=>e.date>=wa.toISOString().slice(0,10)).reduce((s,e)=>s+e.total,0);
  const tot=mine.reduce((s,e)=>s+e.total,0);
  const byT={};ET.forEach(t=>{byT[t]=mine.filter(e=>e.type===t).reduce((s,e)=>s+e.total,0)});
  const mc={};mine.forEach(e=>{mc[e.itemName]=(mc[e.itemName]||0)+e.total});
  const top=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
  let h=`<div class="pt">الصرفيات <span>اليومية</span></div>`;
  h+=`<div class="sg"><div class="sc co"><div class="sl">صرفيات اليوم</div><div class="sv">${fmt(tdt)}</div><div class="su">دينار</div></div><div class="sc cp"><div class="sl">صرفيات الشهر</div><div class="sv">${fmt(mnt)}</div><div class="su">دينار</div></div><div class="sc cb"><div class="sl">صرفيات الأسبوع</div><div class="sv">${fmt(wkt)}</div><div class="su">دينار</div></div><div class="sc cg"><div class="sl">إجمالي الكل</div><div class="sv">${fmt(tot)}</div><div class="su">دينار</div></div></div>`;
  if(top)h+=`<div class="card" style="margin-bottom:14px"><div class="ch"><span class="cht">أعلى صرفية</span></div><div style="padding:14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:15px;font-weight:800">${top[0]}</div><div style="font-size:16px;font-weight:900;color:#1d4ed8">${fmt(top[1])} د</div></div></div>`;
  h+=`<div class="card" style="margin-bottom:14px"><div class="ch"><span class="cht">حسب النوع</span></div>`;
  ET.forEach(t=>{if(!byT[t])return;const col=TC[t];h+=`<div class="ri"><div class="rim"><div class="rit" style="color:${col}">${t}</div></div><div class="riv" style="color:${col}">${fmt(byT[t])} د</div></div>`});

// End driver shift
function confirmResetTasks(){
  const tasks=db.tasks||[];
  const done=tasks.filter(t=>t.status==="تم الإنجاز");
  const totalSpent=done.filter(t=>t.actualCost).reduce((s,t)=>s+(t.actualCost||0),0);
  const pending2=tasks.filter(t=>t.status!=="تم الإنجاز").length;
  showCov(
    "إنهاء شفت السائق",
    "منجزة: "+done.length+" | معلقة: "+pending2+" | منفق: "+fmt(totalSpent)+" د — سيتم تصفير جميع المهام",
    ()=>{
      // Reset tasks - keep categories, delete all tasks
      db.tasks=[];
      db.nextTaskId=1;
      sdb();
      showBanner("تم إنهاء الشفت — المهام حُذفت والتصنيفات محفوظة","#16a34a");
      setTimeout(hideBanner,3500);
      render();
    }
  );
}

      <div style="font-size:15px;font-weight:800;color:var(--tx);margin-bottom:6px">${task.name}</div>
      ${task.qty?`<div style="font-size:12px;color:var(--mu)">الكمية المطلوبة: <b>${task.qty}</b></div>`:''}
      ${task.note?`<div style="font-size:12px;color:var(--mu);margin-top:3px">ملاحظة: ${task.note}</div>`:''}
    </div>
    <div class="fg">
      <label>المبلغ الفعلي المدفوع (دينار)</label>
      <input class="fi" id="taskCost" type="number" inputmode="numeric" placeholder="0" style="font-size:20px;font-weight:800;text-align:center"/>
    </div>
    <div id="budgetInfo" style="background:rgba(225,29,72,.06);border:1.5px solid rgba(225,29,72,.15);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--tx2)">
    </div>`;

  // Show budget info
  const todayRec=db.records.find(r=>r.date===tds());
  const budget=todayRec?todayRec.netIncome:0;
  const spent=(db.tasks||[]).filter(t=>t.status==="تم الإنجاز"&&t.actualCost&&t.date===tds()).reduce((s,t)=>s+(t.actualCost||0),0);
  const remaining=budget-spent;

  document.getElementById("budgetInfo").innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span>الرصيد المتبقي:</span>
      <b style="color:${remaining>0?"var(--gr)":"var(--rd)"}">${fmt(remaining)} د</b>
    </div>
    <div style="font-size:11px;color:var(--mu)">بعد هذه المهمة سيتبقى: <span id="afterBalance">${fmt(remaining)} د</span></div>`;

  // Live update remaining
  setTimeout(()=>{
    const inp=document.getElementById("taskCost");
    if(inp){
      inp.oninput=()=>{
        const cost=parseFloat(inp.value)||0;
        const after=remaining-cost;
        const el=document.getElementById("afterBalance");
        if(el){
          el.textContent=fmt(after)+" د";
          el.style.color=after>=0?"var(--gr)":"var(--rd)";
          el.style.fontWeight="800";
        }
      };
      inp.focus();
    }
  },100);

  document.getElementById("MSV").textContent="تأكيد الإنجاز";
  document.getElementById("MSV").onclick=()=>saveTaskCost(taskId);
  openM();
}

function saveTaskCost(taskId){
  const cost=parseFloat(document.getElementById("taskCost")?.value)||0;
  if(!cost){alert("يرجى إدخال المبلغ المدفوع");return}
  db.tasks=db.tasks.map(t=>t.id===taskId?{...t,status:"تم الإنجاز",actualCost:cost,date:tds(),completedBy:CU.id}:t);
  sdb();closeM();render();
}

  return h;
}

function oEU(id){eUid=id;const u=db.users.find(x=>x.id===id);if(!u)return;document.getElementById("MTL").textContent="تعديل الموظف";document.getElementById("MBD").innerHTML=uFrm({...u,password:""});document.getElementById("MSV").onclick=svU;openM()}
function uFrm(u){return`<div class="fg"><label>الاسم الكامل</label><input class="fi" id="un" type="text" placeholder="محمد أحمد" value="${u.name||""}"/></div><div class="fg"><label>اسم المستخدم</label><input class="fi" id="uu" type="text" placeholder="للدخول" value="${u.username||""}" autocomplete="off" autocorrect="off" autocapitalize="off"/></div><div class="fg"><label>كلمة المرور${eUid?" (فارغة = بدون تغيير)":""}</label><input class="fi" id="upw" type="password" placeholder="كلمة المرور"/></div><div class="fg"><label>الدور</label><select class="fi" id="ur"><option value="manager"${(u.role||"")===("manager")?" selected":""}>مدير</option><option value="cashier"${(u.role||"")===("cashier")?" selected":""}>كاشير</option><option value="driver"${(u.role||"")===("driver")?" selected":""}>سائق</option></select></div>`}
function svU(){const name=document.getElementById("un")?.value.trim(),uname=document.getElementById("uu")?.value.trim(),pw=document.getElementById("upw")?.value,role=document.getElementById("ur")?.value;if(!name||!uname){alert("يرجى إدخال الاسم واسم المستخدم");return}if(!eUid&&!pw){alert("يرجى إدخال كلمة المرور");return}if(eUid)db.users=db.users.map(u=>u.id===eUid?{...u,name,username:uname,role,...(pw?{password:pw}:{})}:u);else{if(db.users.find(u=>u.username===uname)){alert("اسم المستخدم موجود مسبقاً");return}db.users.push({id:db.nextUserId++,username:uname,password:pw,name,role,active:true})}sdb();closeM();render()}
function togU(id){if(id===CU.id)return;db.users=db.users.map(u=>u.id===id?{...u,active:!u.active}:u);sdb();render()}

// MODAL / CONFIRM
function openM(){
  document.getElementById("MOV").classList.add("on");
  // Push history state so back button closes modal
  history.pushState({modal:true},"");
}
function closeM(){
  document.getElementById("MOV").classList.remove("on");
}
function handleMBg(e){
  // Do NOT close on background tap - only close via back button or cancel/save
  // (removed background tap dismiss to prevent accidental data loss)
}
function showCov(t,s,cb){
  document.getElementById("CTL").textContent=t;
  document.getElementById("CSB").textContent=s;
  document.getElementById("CYB").onclick=()=>{cb();closeCov()};
  document.getElementById("COV").classList.add("on");
  history.pushState({confirm:true},"");
}
function closeCov(){
  document.getElementById("COV").classList.remove("on");
}

// Handle back button
window.addEventListener("popstate",e=>{
  // If modal is open, close it (without clearing data)
  const mov=document.getElementById("MOV");
  if(mov.classList.contains("on")){
    mov.classList.remove("on");
    return;
  }
  // If confirm is open, close it
  const cov=document.getElementById("COV");
  if(cov.classList.contains("on")){
    cov.classList.remove("on");
    return;
  }
});

let _ty=0;
document.getElementById("MBOX").addEventListener("touchstart",e=>{_ty=e.touches[0].clientY},{passive:true});
document.getElementById("MBOX").addEventListener("touchmove",e=>{
  // Swipe down only closes if at top of modal scroll
  const mbox=document.getElementById("MBOX");
  if(mbox.scrollTop===0 && e.touches[0].clientY-_ty>80){
    closeM();
    if(history.state&&history.state.modal) history.back();
  }
},{passive:true});
window.addEventListener('load', initFirebase);
