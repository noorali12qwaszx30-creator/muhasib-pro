name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init \
            --manifest "https://noorali12qwaszx30-creator.github.io/muhasib-pro/manifest.json" \
            --directory . \
            --skip-prompt \
            --host "noorali12qwaszx30-creator.github.io" \
            --name "محاسب برو" \
            --launcherName "محاسب برو" \
            --themeColor "#0EA5A8" \
            --backgroundColor "#F8FAFC" \
            --startUrl "/muhasib-pro/index.html" \
            --iconUrl "https://noorali12qwaszx30-creator.github.io/muhasib-pro/icon-512.png" \
            --iconSize "512x512" \
            --packageId "com.muhasibpro.app"

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation

      - name: Find APK file
        run: find apk-build -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muhasib-pro-apk
          path: |
            apk-build/app-release-signed.apk
            apk-build/**/*.apk
          if-no-files-found: warn
